<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neevel</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='32' fill='%23E8A838'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&family=Libre+Baskerville:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<section id="light-demo" class="product-scene product-scene--demo" aria-label="Neevel light animation study">
    <nav class="scene-nav" aria-label="Secondary">
        <a href="/" class="scene-logo">Neevel</a>
    </nav>
</section>

<section id="selected" class="product-scene product-scene--copy" aria-labelledby="hero-title">
    <nav class="scene-nav" aria-label="Primary">
        <a href="/" class="scene-logo">Neevel</a>
    </nav>
    <div class="scene-copy">
        <div class="scene-eyebrow">Stanford 2026 · 2nd place</div>
        <h1 id="hero-title" class="scene-title">Falls are sudden.<br>Neevel isn't.</h1>
        <p>A responsive fall-prevention system made to feel calm, warm, and already at home.</p>
        <span class="scene-cta">Site coming soon <span>→</span></span>
    </div>
</section>

<script>
window.addEventListener('DOMContentLoaded', () => {
    window.setTimeout(() => {
        document.querySelector('.product-scene--demo')?.classList.add('is-on');
    }, 240);
});
</script>

</body>
</html>
